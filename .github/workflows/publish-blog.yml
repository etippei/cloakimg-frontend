name: Publish Blog from Issues

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed]
  workflow_dispatch:  # 手动触发

jobs:
  build-blog:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'blog') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install markdown pyyaml frontmatter

      - name: Fetch and Build Blog Posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python .github/scripts/build_blog.py

      - name: Commit and push generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/ frontend/blog.html
          git diff --staged --quiet || git commit -m "chore: auto-update blog from issues [skip ci]"
          git push
